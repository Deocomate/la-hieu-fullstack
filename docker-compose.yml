services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lahieu_app
    restart: unless-stopped
    ports:
      - '8080:8080'
    expose:
      - '8080'
    environment:
      TZ: Asia/Ho_Chi_Minh
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: sqlite
      # Persist SQLite inside the storage volume (do not mount /database — that hides migrations).
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
      LOG_CHANNEL: stderr
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - lahieu_storage:/var/www/html/storage
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  lahieu_storage:
    driver: local
